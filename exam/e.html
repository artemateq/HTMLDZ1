<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аккаунт</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #090909; color: #e8e8e8; font-family: sans-serif; }

    header {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; color: #ff0000; text-decoration: none; }
    .logo img { width: 90px; height: auto; }
    .search {
      flex: 1; min-width: 220px; max-width: 720px;
      margin: 0 16px;
      display: flex;
      background: #141414;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    .search input { flex: 1; padding: 10px 14px; border: none; background: transparent; color: #e8e8e8; outline: none; }
    .search input::placeholder { color: #8f8f8f; }
    .search button { padding: 10px 18px; border: none; background: #222; color: #fff; cursor: pointer; }
    .search button:hover { background: #2f2f2f; }

    .user-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #ff0000;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 16px;
      cursor: pointer; border: 2px solid #ff4444;
      text-decoration: none;
    }

    
    .page { max-width: 680px; margin: 40px auto; padding: 0 16px; }

    .profile-card {
      background: #141414;
      border: 1px solid #202020;
      border-radius: 18px;
      padding: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .avatar-big {
      width: 96px; height: 96px; border-radius: 50%;
      background: #ff0000;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 700; color: #fff;
      border: 3px solid #ff4444;
    }

    .profile-name { font-size: 24px; font-weight: 700; color: #fff; margin: 0; }
    .profile-email { font-size: 14px; color: #a8a8a8; margin: 0; }

    .edit-btn {
      margin-top: 8px;
      padding: 10px 28px;
      border-radius: 999px;
      border: 1px solid #444;
      background: #1f1f1f;
      color: #e8e8e8;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .edit-btn:hover { background: #2f2f2f; }

    .section {
      background: #141414;
      border: 1px solid #202020;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 16px 20px 8px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-top: 1px solid #1e1e1e;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: #e8e8e8;
    }
    .menu-item:first-of-type { border-top: none; }
    .menu-item:hover { background: #1a1a1a; }

    .menu-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: #222;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .menu-label { flex: 1; font-size: 15px; }
    .menu-arrow { color: #555; font-size: 18px; }

    .logout-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #3a1a1a;
      background: #1a0a0a;
      color: #ff4444;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: #2a1010; }

    @media (max-width: 520px) {
      .profile-card { padding: 24px 16px; }
      header { flex-wrap: wrap; }
      .search { margin: 8px 0; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="exam.html">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/34/YouTube_logo_%282017%29.png" alt="YouTube">
  </a>
  <div class="search">
    <input type="text" placeholder="Искать" />
    <button>Поиск</button>
  </div>
  <a class="user-avatar" href="account.html" title="Аккаунт">A</a>
</header>

<div class="page">

  <div class="profile-card">
    <div class="avatar-big">A</div>
    <p class="profile-name">Артем</p>
    <p class="profile-email">artem67@gmail.com</p>
    <button class="edit-btn">Редактировать профиль</button>
  </div>

  <div class="section">
    <div class="section-title">Мой контент</div>
    <a class="menu-item" href="#">
      <div class="menu-icon">▶</div>
      <span class="menu-label">Мои видео</span>
      <span class="menu-arrow">›</span>
    </a>
    <a class="menu-item" href="#">
      <div class="menu-icon">♥</div>
      <span class="menu-label">Понравившиеся</span>
      <span class="menu-arrow">›</span>
    </a>
    <a class="menu-item" href="#">
      <div class="menu-icon">🕐</div>
      <span class="menu-label">История просмотров</span>
      <span class="menu-arrow">›</span>
    </a>
    <a class="menu-item" href="#">
      <div class="menu-icon">📋</div>
      <span class="menu-label">Плейлисты</span>
      <span class="menu-arrow">›</span>
    </a>
  </div>

  <div class="section">
    <div class="section-title">Настройки</div>
    <a class="menu-item" href="#">
      <div class="menu-icon">⚙</div>
      <span class="menu-label">Настройки аккаунта</span>
      <span class="menu-arrow">›</span>
    </a>
    <a class="menu-item" href="#">
      <div class="menu-icon">🔔</div>
      <span class="menu-label">Уведомления</span>
      <span class="menu-arrow">›</span>
    </a>
    <a class="menu-item" href="#">
      <div class="menu-icon">🔒</div>
      <span class="menu-label">Конфиденциальность</span>
      <span class="menu-arrow">›</span>
    </a>
  </div>

  <button class="logout-btn" onclick="window.location.href='exam.html'">Выйти из аккаунта</button>

</div>

</body>
</html>
