<!DOCTYPE html>
<html>
<head>
  <style>
    ol {
      background: #f4a7b9;
      padding: 20px 20px 20px 50px;
    }
    li {
      background: #e07090;
      margin: 10px 0;
      padding: 6px 0;
    }
    span {
      background: #c0405a;
      color: white;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <ol>
    <li><span>Apple</span></li>
    <li><span>Orange</span></li>
    <li><span>Pineapple</span></li>
    <li><span>Pear</span></li>
    <li><span>Cherry</span></li>
  </ol>
</body>
</html>
