<!DOCTYPE html>
<html>
<head>
  <style>
    ul { list-style: none; padding: 0; max-width: 400px; }
    li { display: flex; gap: 10px; padding: 10px 16px; }
    li:nth-child(odd)  { background: #b8d8e8; }
    li:nth-child(even) { background: #d0eaf5; }
    li.done { background: #c0c0c0; }
    li.done span { text-decoration: line-through; }
    .x { margin-left: auto; color: red; }
  </style>
</head>
<body>
  <h2>My To Do List</h2>
  <ul>
    <li>&#9633; <span>Hit the gym</span>     <b class="x">&#10005;</b></li>
    <li class="done">&#9745; <span>Pay bills</span>  <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Meet John</span>       <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Buy eggs</span>        <b class="x">&#10005;</b></li>
    <li class="done">&#9745; <span>Read a book</span> <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Organize office</span> <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Eat dinner</span>      <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Buy apples</span>      <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Meet George</span>     <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Feed the cat</span>    <b class="x">&#10005;</b></li>
    <li class="done">&#9745; <span>Write a letter</span> <b class="x">&#10005;</b></li>
    <li>&#9633; <span>Run 1 km</span>        <b class="x">&#10005;</b></li>
  </ul>
</body>
</html>
