<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .li {
            max-width: 300px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .li div {
            margin-bottom: 10px;
            
        }

        .li div s {
            text-decoration: line-through;
            background-color:#E1E1E1 ;
        }

        div{
            background-color: #A4CBDA;
        }
    </style>
</head>

<body>
    <div class="li">
        <h1>My To-Do List</h1>
        <div>Hit the gym</div>
        <div><s>Pay bills</s></div>
        <div>Meet John</div>
        <div>Buy eggs</div>
        <div><s>Read a book</s></div>
        <div>Organize office</div>
        <div>Eat dinner</div>
        <div>Buy apples</div>
        <div>Meet George</div>
        <div><s>Feed a cat</s></div>
        <div>Write a letter</div>
        <div>run 1 km</div>
    </div>
</body>

</html>
