<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>n1</title>

<style>

.box{
width:300px;
height:40px;
border:3px solid orange;
margin:100px auto;
}

.bar{
width:50px;
height:40px;
background:orange;
animation:move 3s infinite;
}

@keyframes move{
0%{margin-left:0}
50%{margin-left:250px}
100%{margin-left:0}
}

</style>
</head>

<body>

<div class="box">
<div class="bar"></div>
</div>

</body>
</html>
